<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StoreSync — Login</title>
<link rel="stylesheet" href="styles.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; padding:20px; }

/* Animated gradient background */
.login-bg {
  position:fixed; inset:0; z-index:-1;
  background: linear-gradient(135deg,#0f1729 0%,#1a1050 40%,#0f2744 70%,#0b0e1a 100%);
}
.login-bg::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 80% 60% at 20% 40%,rgba(99,102,241,.25) 0%,transparent 60%),
              radial-gradient(ellipse 60% 80% at 80% 70%,rgba(20,184,166,.18) 0%,transparent 60%);
  animation: bgShift 8s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0%   { opacity:.7; }
  100% { opacity:1; }
}

/* Floating orbs */
.orb {
  position:fixed; border-radius:50%;
  animation: orbFloat linear infinite;
  pointer-events:none; z-index:0;
}
.orb1 { width:300px; height:300px; top:-80px; left:-80px; background:radial-gradient(circle,rgba(99,102,241,.2) 0%,transparent 70%); animation-duration:20s; }
.orb2 { width:200px; height:200px; bottom:10%; right:5%;  background:radial-gradient(circle,rgba(20,184,166,.2) 0%,transparent 70%); animation-duration:15s; animation-direction:reverse; }
.orb3 { width:160px; height:160px; top:50%;   right:20%;  background:radial-gradient(circle,rgba(139,92,246,.15) 0%,transparent 70%); animation-duration:25s; }
@keyframes orbFloat {
  0%,100% { transform:translate(0,0) scale(1); }
  33%      { transform:translate(30px,-20px) scale(1.05); }
  66%      { transform:translate(-20px,15px) scale(0.95); }
}

/* Card */
.login-card {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 28px;
  padding: 44px 40px;
  width: 100%; max-width: 500px;
  position: relative; z-index:10;
  box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
  animation: cardIn .7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(40px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }

.login-brand {
  display:flex; align-items:center; justify-content:center; gap:12px;
  margin-bottom:8px;
}
.login-brand-icon {
  width:52px; height:52px; border-radius:16px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4);
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 8px 24px rgba(99,102,241,.5);
  animation: iconGlow 2.5s ease-in-out infinite;
}
@keyframes iconGlow {
  0%,100% { box-shadow:0 8px 24px rgba(99,102,241,.5); }
  50%      { box-shadow:0 8px 36px rgba(99,102,241,.8), 0 0 60px rgba(99,102,241,.3); }
}
.login-brand-icon svg { width:26px; height:26px; color:#fff; }
.login-brand-name { font-size:28px; font-weight:800; color:#fff; letter-spacing:-.5px; }

.login-tagline { text-align:center; color:rgba(255,255,255,.45); font-size:14px; margin-bottom:36px; }

/* Role tabs */
.role-tabs { display:flex; gap:8px; background:rgba(0,0,0,.25); border-radius:14px; padding:6px; margin-bottom:28px; }
.role-tab {
  flex:1; padding:10px; border-radius:10px; border:none; cursor:pointer;
  font-size:14px; font-weight:600; font-family:var(--font-sans);
  color:rgba(255,255,255,.5);
  background:transparent; transition:all .25s;
}
.role-tab.active {
  background:rgba(255,255,255,.12);
  color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.role-tab .tab-icon { font-size:20px; display:block; margin-bottom:3px; }

/* Input group */
.input-group {
  position:relative; margin-bottom:14px;
}
.input-group .input-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:rgba(255,255,255,.35); pointer-events:none;
}
.input-group .input-icon svg { width:17px; height:17px; }
.login-input {
  width:100%; padding:13px 14px 13px 44px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.12);
  border-radius:12px;
  color:#fff; font-size:14px; font-family:var(--font-sans);
  outline:none; transition:all .22s;
}
.login-input::placeholder { color:rgba(255,255,255,.35); }
.login-input:focus {
  border-color:rgba(99,102,241,.8);
  background:rgba(255,255,255,.1);
  box-shadow:0 0 0 3px rgba(99,102,241,.2);
}
.input-group .pw-toggle {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,.35); padding:0;
}
.input-group .pw-toggle:hover { color:rgba(255,255,255,.7); }
.input-group .pw-toggle svg { width:17px; height:17px; }

/* Login btn */
.login-btn {
  width:100%; padding:14px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none; border-radius:12px;
  color:#fff; font-size:15px; font-weight:700;
  font-family:var(--font-sans); cursor:pointer;
  transition:all .25s; margin-top:6px;
  box-shadow:0 4px 20px rgba(99,102,241,.45);
  position:relative; overflow:hidden;
}
.login-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(99,102,241,.6);
}
.login-btn:active { transform:scale(.98); }
.login-btn .btn-loader { display:none; }
.login-btn.loading .btn-text { display:none; }
.login-btn.loading .btn-loader { display:inline-block; width:18px; height:18px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

.login-hint {
  text-align:center; margin-top:20px; padding-top:20px;
  border-top:1px solid rgba(255,255,255,.08);
}
.hint-label { font-size:12px; color:rgba(255,255,255,.35); margin-bottom:8px; }
.hint-creds {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:10px; padding:8px 14px;
  font-size:12px; font-family:monospace; color:rgba(255,255,255,.55);
}

/* Error */
.login-error {
  padding:12px 16px; border-radius:10px;
  background:rgba(244,63,94,.15); border:1px solid rgba(244,63,94,.3);
  color:#fb7185; font-size:13px; font-weight:600;
  margin-bottom:14px; display:none;
  animation:shake .4s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)}
}
.login-error.show { display:block; }

/* Stars bg */
.stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle linear infinite; }
@keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:.6} }
</style>
</head>
<body>
<div class="login-bg"></div>
<div class="stars" id="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="login-card">
  <div class="login-brand">
    <div class="login-brand-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-4L4 7m8 4v10M4 7v10l8 4"/></svg>
    </div>
    <span class="login-brand-name">StoreSync</span>
  </div>
  <p class="login-tagline">Smart Retail Management Platform</p>

  <!-- Role tabs -->
  <div class="role-tabs">
    <button class="role-tab active" onclick="switchRole('manager',this)">
      <span class="tab-icon">🏬</span> Manager
    </button>
    <button class="role-tab" onclick="switchRole('worker',this)">
      <span class="tab-icon">👨‍💼</span> Worker
    </button>
  </div>

  <!-- Error -->
  <div class="login-error" id="loginError">Invalid credentials. Please try again.</div>

  <!-- Username -->
  <div class="input-group">
    <span class="input-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></span>
    <input id="username" class="login-input" type="text" placeholder="Username" autocomplete="username">
  </div>

  <!-- Password -->
  <div class="input-group">
    <span class="input-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg></span>
    <input id="password" class="login-input" type="password" placeholder="Password" autocomplete="current-password">
    <button class="pw-toggle" onclick="togglePw()" type="button" id="pwToggleBtn">
      <svg id="eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
    </button>
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">
    <span class="btn-text" id="loginBtnText">Sign In</span>
    <span class="btn-loader" id="loginLoader"></span>
  </button>

  <div class="login-hint">
    <div class="hint-label">Default credentials</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <div class="hint-creds">manager / admin123</div>
      <div class="hint-creds">worker / worker123</div>
    </div>
  </div>
</div>

<script>
localStorage.clear();
let currentRole = 'manager';
let pwVisible = false;

function switchRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginError').classList.remove('show');
  // Pre-fill hint
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

function togglePw() {
  pwVisible = !pwVisible;
  const inp = document.getElementById('password');
  inp.type = pwVisible ? 'text' : 'password';
  const icon = document.getElementById('eyeIcon');
  icon.innerHTML = pwVisible
    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>'
    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
}

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const err = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  err.classList.remove('show');

  const creds = {
    manager: { u: 'manager', p: 'admin123', dest: 'inventory.html' },
    worker:  { u: 'worker',  p: 'worker123', dest: 'billing.html' }
  };
  const c = creds[currentRole];

  if (u === c.u && p === c.p) {
    btn.classList.add('loading');
    localStorage.setItem('role', currentRole);
    localStorage.setItem('user', JSON.stringify({ username: u, role: currentRole, name: currentRole === 'manager' ? 'Store Manager' : 'Store Worker' }));
    setTimeout(() => { location.href = c.dest; }, 900);
  } else {
    err.classList.add('show');
    btn.style.animation = 'none';
    setTimeout(() => btn.style.animation = '', 400);
  }
}

// Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Generate stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  const size = Math.random() * 2.5 + 0.5;
  s.className = 'star';
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*5}s;opacity:${0.1+Math.random()*0.3}`;
  starsEl.appendChild(s);
}
</script>
</body>
</html>
